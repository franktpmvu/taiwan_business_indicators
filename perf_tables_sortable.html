const columns = ["組合(0050/00631L/2330)", "版本", "總投入", "最終淨值", "獲利", "MOIC", "XIRR", "TWRR", "年化波動", "Sharpe", "Sortino", "MDD", "Calmar", "CAGR_like"];

function parseCell(txt){
  const t = (txt ?? "").toString().trim();
  if(t === "") return NaN;
  if(t.endsWith("%")){
    const v = parseFloat(t.replaceAll(",","").slice(0,-1));
    return isNaN(v) ? NaN : v/100.0;
  }
  const v = parseFloat(t.replaceAll(",",""));
  if(!isNaN(v)) return v;
  return t.toLowerCase();
}

function buildTable(){
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const trh = document.createElement("tr");
  columns.forEach(c => {
    const th = document.createElement("th");
    th.textContent = c;
    th.addEventListener("click", () => sortBy(c, th));
    trh.appendChild(th);
  });
  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  data.forEach(row => {
    const tr = document.createElement("tr");
    columns.forEach(c => {
      const td = document.createElement("td");
      td.textContent = row[c];
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  return table;
}

let currentSort = {col:null, dir:1};

function sortBy(col, th){
  document.querySelectorAll("th").forEach(h => h.classList.remove("sort-asc","sort-desc"));
  if(currentSort.col === col){ currentSort.dir *= -1; }
  else { currentSort.col = col; currentSort.dir = 1; }
  th.classList.add(currentSort.dir === 1 ? "sort-asc" : "sort-desc");

  data.sort((a,b) => {
    const av = parseCell(a[col]);
    const bv = parseCell(b[col]);
    const aNan = Number.isNaN(av), bNan = Number.isNaN(bv);
    if(aNan && bNan) return 0;
    if(aNan) return 1;
    if(bNan) return -1;

    if(typeof av === "string" && typeof bv === "string"){
      return av.localeCompare(bv) * currentSort.dir;
    }
    if(av < bv) return -1 * currentSort.dir;
    if(av > bv) return  1 * currentSort.dir;
    return 0;
  });

  const container = document.getElementById("table-container");
  container.innerHTML = "";
  container.appendChild(buildTable());
}

document.getElementById("table-container").appendChild(buildTable());
